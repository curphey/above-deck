services:
  # Development server (hot reload, volume mounts)
  web-dev:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - '4321:4321'
    volumes:
      - ./packages/web:/workspace/packages/web
      - /workspace/packages/web/node_modules
    env_file: .env
    profiles:
      - dev

  # Production server (multi-stage build, optimised)
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUBLIC_SUPABASE_URL: ${PUBLIC_SUPABASE_URL}
        PUBLIC_SUPABASE_ANON_KEY: ${PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - '4321:4321'
    env_file: .env
    profiles:
      - prod
